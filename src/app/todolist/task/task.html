<main class="shadow-xs border border-[#E5E5E5] rounded-2xl p-4 flex flex-col gap-1">
    <div class="flex flex-col">
        <div class="text-[12px] font-semibold">
            {{tasks().taskstats}}
        </div>
    </div>
    <div class="flex flex-col justify-start">
        <p class="font-semibold text-[#09090B] text-[16px] leading-6">{{tasks().taskname}}</p>
        <p class="text-[#737373] text-[14px] font-normal truncate line-clamp-1">{{tasks().describion}}</p>
    </div>
    <div class="flex justify-between">
        <p class="text-[#09090B] text-[14px] font-medium">assignees</p>
        <img [src]="" alt="">
    </div>
    <div class="flex justify-between">
        <p class="text-[#737373] text-[14px] font-normal">{{tasks().date |date}}</p>
        <p>{{tasks().pririty}}</p>
    </div>
</main>
