<main class="shadow-xs border border-[#E5E5E5] rounded-2xl p-4 flex flex-col gap-2.5 ">
  <div class="flex justify-between">
    <div
      class="text-[12px] font-semibold text-[#1447E6] bg-[#EFF6FF] py-0.5 px-2 rounded-lg"
      [ngClass]="[textcolor(), bgcolor()]"
    >
      <ax-badge [color]="badgecolor()"></ax-badge> {{ tasks().taskstats }}
    </div>
    <ax-button [look]="'link'" class="ax-sm">
      <ax-icon class="fa-solid fa-ellipsis-vertical text-[#737373]"></ax-icon>
      <ax-dropdown-panel>
        <ax-button-item-list (onItemClick)="setstatus($event)">
          <ax-button-item text="In Progress"></ax-button-item>
          <ax-button-item text="Backlog"></ax-button-item>
          <ax-button-item text="Canceled"></ax-button-item>
          <ax-button-item text="Complete"></ax-button-item>
          <ax-button-item (onClick)="deletetask(tasks().id)" text="Delete" color="danger"><ax-suffix><ax-icon icon="fa-solid fa-trash-can" ></ax-icon></ax-suffix></ax-button-item>
        </ax-button-item-list>
      </ax-dropdown-panel>
    </ax-button>
  </div>
  <div class="flex flex-col justify-start gap-1">
    <p class="font-semibold text-[#09090B] text-[16px] leading-6">{{ tasks().taskname }}</p>
    <p class="text-[#737373] text-[14px] font-normal truncate line-clamp-1">
      {{ tasks().describion }}
    </p>
  </div>
  <div class="flex justify-between">
    <p class="text-[#09090B] text-[14px] font-medium">Assignees:</p>
    <img [src]="tasks().assignees" alt="" />
  </div>
  <div class="flex justify-between">
    <p class="text-[#737373] text-[14px] font-normal flex gap-2 whitespace-nowrap items-center">
      <ax-icon
        class="fa-flag cursor-pointer"
        (click)="changeflag()"
        [class]="tasks().flag ? 'fas text-red-500' : 'fa-regular '"
      ></ax-icon>
      {{ tasks().date | date: 'dd MMM yyyy' }}
    </p>
    <p
      class="text-[12px] font-medium py-0.5 px-2 rounded-lg"
      [class.text-[#BA6E00]]="tasks().pririty === 'Medium'"
      [class.text-[#C10007]]="tasks().pririty === 'High'"
      [class.text[#008236]]="tasks().pririty === 'Low'"
      [class.bg-[#FFEECB]]="tasks().pririty === 'Medium'"
      [class.bg-[#FFE2E2]]="tasks().pririty === 'High'"
      [class.bg-[#DCFCE7]]="tasks().pririty === 'Low'"
    >
      {{ tasks().pririty }}
    </p>
  </div>
</main>
