<main class="flex justify-center items-center">
  <section class="flex justify-center gap-2 items-center flex-col">
    <img src="Icon.svg" alt="" />

    <div class="text-lg font-medium tracking-normal leading-5">No Tasks Yet</div>
    <div class="text-center text-[14px] text-[#737373] leading-5 tracking-normal w-66">
      You haven’t created any tasks yet. Get started by creating your first task.
    </div>
    <div class="mt-2 flex gap-2" axUploaderZone  >
      <ax-button (onClick)="create()" text="Creat Task" color="dark" class="shadow-xs"></ax-button>
      <ax-button axUploaderBrowseHandle  text="Import task" class="shadow-xs"  ></ax-button>
    </div>
  </section>
</main>
