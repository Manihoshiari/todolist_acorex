<div class="flex flex-col min-h-screen">
    <app-header (open)="openForm()" [tasks]="tasks" [visible]="visible"></app-header>
    @if (!visible&& tasks.length===0) {
        <div class=" flex justify-center items-center grow">
        <app-addnewtask (openForm)="openForm()"></app-addnewtask>
    </div>
    }
    @if (visible) {
        <div class="flex justify-center">
            <app-form (formValue)="formValue($event)" (closeform)="closeForm()"></app-form>
        </div>
    }
    @if (!visible) {
       <div class="grid sm:grid-cols-3 2xl:grid-cols-4 grid-cols-1 gap-4 items-stretch pt-8">
         @for (item of tasks; track $index) {
            <app-task [tasks]="item"></app-task>
        }

       </div>
    }
</div>
